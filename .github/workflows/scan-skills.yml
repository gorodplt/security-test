name: Cisco Security Scan
 
on:
  push:
    branches: [main, master]
    paths: ['plugins/**']
  pull_request:
    paths: ['plugins/**']
 
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install scanner
        run: pip install cisco-ai-skill-scanner
      
      - name: Scan plugins
        run: |
          skill-scanner scan-all plugins \
            --recursive \
            --use-behavioral \
            --format markdown \
            --detailed \
            --output scan-report.md
        continue-on-error: true
      
      - name: Generate SARIF
        run: |
          skill-scanner scan-all plugins \
            --recursive \
            --format sarif \
            --output results.sarif
        continue-on-error: true
      
      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-reports
          path: |
            scan-report.md
            results.sarif
          retention-days: 90
