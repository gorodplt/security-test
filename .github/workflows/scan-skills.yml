name: Security Scan (Skills + MCPs)

on:
  push:
    branches: [main, master]
    paths:
      - 'plugins/**'
      - '.claude/skills/**'
      - '**/.mcp.json'
      - '**/mcp/**'
  pull_request:
    paths:
      - 'plugins/**'
      - '.claude/skills/**'
      - '**/.mcp.json'
      - '**/mcp/**'
  workflow_dispatch:

env:
  # Flip to 'true' once we trust the scanners — blocks PRs on findings.
  ENFORCE_BLOCKING: 'false'
  # Shared LLM config for Cisco scanners. litellm requires the provider prefix.
  LLM_MODEL: anthropic/claude-haiku-4-5-20251001

jobs:
  skill-scanner:
    name: Cisco skill-scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install skill-scanner
        run: pip install cisco-ai-skill-scanner

      - name: Scan — Markdown (human-readable)
        env:
          SKILL_SCANNER_LLM_API_KEY: ${{ secrets.SKILL_SCANNER_LLM_API_KEY }}
          SKILL_SCANNER_LLM_MODEL: claude-haiku-4-5-20251001
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          skill-scanner scan-all plugins \
            --recursive \
            --use-llm \
            --use-behavioral \
            --use-virustotal \
            --policy strict \
            --check-overlap \
            --format markdown \
            --detailed \
            --output skill-scanner.md
        continue-on-error: ${{ env.ENFORCE_BLOCKING != 'true' }}

      - name: Publish skill-scanner findings to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Cisco skill-scanner findings"
            echo ""
            if [ -s skill-scanner.md ]; then
              # GitHub's step-summary limit is 1 MB. Truncate just in case.
              head -c 900000 skill-scanner.md
              size=$(wc -c < skill-scanner.md)
              if [ "$size" -gt 900000 ]; then
                echo ""
                echo "_…report truncated at 900 KB; download the \`skill-scanner-report\` artifact for the full file._"
              fi
            else
              echo "_No markdown report was produced (scan step likely failed before output)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload skill-scanner artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: skill-scanner-report
          path: skill-scanner.md
          retention-days: 90
          if-no-files-found: ignore

  agent-scan:
    name: Snyk agent-scan
    runs-on: ubuntu-latest
    # Allowed to fail at the job level until SNYK_TOKEN is configured.
    # Once the secret is in place, delete this line and rely on ENFORCE_BLOCKING.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv stopped publishing moving major tags from v8 — pin to a point release.
        uses: astral-sh/setup-uv@v8.1.0

      - name: Scan skills with agent-scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # --skills points at a directory of Skill definitions; recurse into plugins/
          uvx snyk-agent-scan@latest --skills plugins --json > agent-scan.json
        continue-on-error: ${{ env.ENFORCE_BLOCKING != 'true' }}

      - name: Publish agent-scan findings to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Snyk agent-scan findings"
            echo ""
            if [ -s agent-scan.json ]; then
              # Try to format with jq; fall back to raw JSON in a code fence.
              if command -v jq >/dev/null && jq -e . agent-scan.json >/dev/null 2>&1; then
                echo '<details><summary>Pretty-printed JSON (click to expand)</summary>'
                echo ''
                echo '```json'
                jq '.' agent-scan.json | head -c 900000
                echo '```'
                echo '</details>'
              else
                echo '<details><summary>Raw output (click to expand)</summary>'
                echo ''
                echo '```'
                head -c 900000 agent-scan.json
                echo '```'
                echo '</details>'
              fi
            else
              echo "_No agent-scan output produced. Likely missing/invalid \`SNYK_TOKEN\`._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent-scan artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: agent-scan-report
          path: agent-scan.json
          retention-days: 90
          if-no-files-found: ignore

  mcp-scanner:
    name: Cisco mcp-scanner (conditional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect MCP configs
        id: mcp
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(**/.mcp.json **/mcp.json **/tools.json **/prompts.json **/resources.json mcp/**/*.json plugins/**/mcp/**/*.json)
          if [ ${#files[@]} -gt 0 ]; then
            printf '%s\n' "${files[@]}" > mcp-targets.txt
            echo "Found MCP configs:"
            cat mcp-targets.txt
            echo "has_mcp=true" >> "$GITHUB_OUTPUT"
          else
            echo "No MCP configs found in repo." | tee mcp-scanner.txt
            echo "has_mcp=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.mcp.outputs.has_mcp == 'true'
        with:
          python-version: '3.12'

      - name: Install mcp-scanner
        if: steps.mcp.outputs.has_mcp == 'true'
        run: pip install cisco-ai-mcp-scanner

      - name: Scan discovered MCP configs
        if: steps.mcp.outputs.has_mcp == 'true'
        env:
          MCP_SCANNER_LLM_API_KEY: ${{ secrets.SKILL_SCANNER_LLM_API_KEY }}  # reuse Anthropic key
          MCP_SCANNER_LLM_MODEL: ${{ env.LLM_MODEL }}
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          # Static-analysis mode. When live servers land, add --server-url invocations per file.
          tools_file=$(grep -E 'tools\.json$' mcp-targets.txt | head -1 || true)
          if [ -z "$tools_file" ]; then
            echo "MCP configs detected but no tools.json among them — emitting empty report." > mcp-scanner.json
          else
            mcp-scanner --analyzers yara,vulnerable-package,llm \
              --format raw static \
              --tools "$tools_file" \
              > mcp-scanner.json || true
          fi
        continue-on-error: ${{ env.ENFORCE_BLOCKING != 'true' }}

      - name: Publish mcp-scanner findings to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔎 Cisco mcp-scanner findings"
            echo ""
            if [ -s mcp-scanner.json ]; then
              if command -v jq >/dev/null && jq -e . mcp-scanner.json >/dev/null 2>&1; then
                echo '<details><summary>Pretty-printed JSON (click to expand)</summary>'
                echo ''
                echo '```json'
                jq '.' mcp-scanner.json | head -c 900000
                echo '```'
                echo '</details>'
              else
                echo '<details><summary>Raw output (click to expand)</summary>'
                echo ''
                echo '```'
                head -c 900000 mcp-scanner.json
                echo '```'
                echo '</details>'
              fi
            elif [ -s mcp-scanner.txt ]; then
              cat mcp-scanner.txt
            else
              echo "_No MCP scan output produced._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mcp-scanner artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mcp-scanner-report
          path: |
            mcp-scanner.json
            mcp-scanner.txt
            mcp-targets.txt
          retention-days: 90
          if-no-files-found: ignore
